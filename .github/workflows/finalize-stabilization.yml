name: Finalize stabilization

on:
  push:
    branches:
      - stabilize-and-deploy
    paths:
      - .github/workflows/finalize-stabilization.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate reproducible lockfile
        run: |
          npm install --package-lock-only --ignore-scripts
          node -e 'JSON.parse(require("fs").readFileSync("package-lock.json", "utf8"))'
          ! grep -q "applied-caas" package-lock.json

      - name: Remove obsolete automation artifacts
        run: |
          rm -f .github/workflows/apply-corrections.yml
          rm -f .github/workflows/apply-fix2.yml
          rm -f corrections.chunk-*
          rm -f fix2.chunk-*
          rm -f package-lock.payload-*
          rm -f NO3

      - name: Install and verify
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: Commit finalized stabilization
        run: |
          rm -f .github/workflows/finalize-stabilization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize reproducible stabilization"
          git push origin HEAD:stabilize-and-deploy
