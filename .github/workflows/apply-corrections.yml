name: Apply reviewed corrections

on:
  push:
    branches:
      - feature/study-app-mvp
    paths:
      - corrections.chunk-*
      - .github/workflows/apply-corrections.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct reviewed patch
        run: |
          cat corrections.chunk-* \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/corrections.patch
          git apply --check /tmp/corrections.patch

      - name: Apply reviewed patch
        run: git apply /tmp/corrections.patch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type checking
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser and accessibility tests
        run: npm run test:e2e

      - name: Remove temporary payload
        run: |
          rm corrections.chunk-*
          rm .github/workflows/apply-corrections.yml

      - name: Commit verified corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve primary technical audit findings"
          git push origin HEAD:feature/study-app-mvp

# Triggered after the complete reviewed payload was staged.
